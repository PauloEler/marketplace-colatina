services:
  - type: web
    name: mercado-colatina
    runtime: python
    region: virginia
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --workers 2 --threads 4 --timeout 60"
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_NAME
        value: Administrador
      - key: ADMIN_WHATSAPP
        value: "27998984840"
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/uploads
      - key: DATABASE_URL
        fromDatabase:
          name: mercado-colatina-db
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false
      - key: PLAN_PRICE
        value: "10.00"
      - key: PLAN_PRICE_DISPLAY
        value: "R$ 10,00"
      - key: PIX_KEY
        value: "27998984840"
      - key: PIX_RECEIVER_NAME
        value: Mercado Colatina
      - key: PAYMENT_WHATSAPP
        value: "27998984840"
      - key: MERCADO_LIVRE_AFILIADO_URL
        value: https://meli.la/1yyfAoN
      - key: MP_CLIENT_ID
        value: "3630928256298103"
      - key: MP_CLIENT_SECRET
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: MP_REDIRECT_URI
        value: https://mercado-colatina.onrender.com/mercadopago/oauth/callback
      - key: MARKETPLACE_FEE_PERCENT
        value: "0"

databases:
  - name: mercado-colatina-db
    region: virginia
    databaseName: mercado_colatina
    user: mercado_colatina
    plan: basic-256mb
