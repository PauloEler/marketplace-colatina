{% extends 'base.html' %}
{% block title %}Cadastro | Mercado Colatina{% endblock %}

{% block voltar %}<a href="/login" class="voltar">Voltar ao login</a>{% endblock %}

{% block content %}
<div style="max-width:420px;margin:0 auto">
  <h2 style="margin-bottom:18px">Criar conta</h2>
  <div class="form-box">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-grupo">
        <label>Nome completo</label>
        <input type="text" name="nome" required autofocus minlength="3" maxlength="80" placeholder="Seu nome">
      </div>
      <div class="form-grupo">
        <label>Username</label>
        <input type="text" name="username" required minlength="3" maxlength="24" pattern="[A-Za-z0-9_]{3,24}" placeholder="Como voce vai entrar">
      </div>
      <div class="form-grupo">
        <label>Senha</label>
        <input type="password" name="senha" required minlength="4">
      </div>
      <div class="form-grupo">
        <label>WhatsApp com DDD</label>
        <input type="text" name="whatsapp" required inputmode="numeric" minlength="10" maxlength="11" pattern="[0-9]{10,11}" placeholder="27999999999">
      </div>
      <button class="btn btn-verde" type="submit" style="width:100%">Criar conta</button>
    </form>
    <p style="text-align:center;margin-top:14px;font-size:.88rem">
      Ja tem conta? <a href="/login" style="color:#1a6b3c">Entrar</a>
    </p>
  </div>
</div>
{% endblock %}
