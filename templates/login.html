{% extends 'base.html' %}
{% block title %}Login | Mercado Colatina{% endblock %}

{% block voltar %}<a href="/" class="voltar">Voltar ao inicio</a>{% endblock %}

{% block content %}
<div style="max-width:390px;margin:0 auto">
  <h2 style="margin-bottom:18px">Entrar</h2>
  <div class="form-box">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-grupo">
        <label>Usuario</label>
        <input type="text" name="username" required autofocus maxlength="24">
      </div>
      <div class="form-grupo">
        <label>Senha</label>
        <input type="password" name="senha" required minlength="4">
      </div>
      <button class="btn btn-verde" type="submit" style="width:100%">Entrar</button>
    </form>
    <p style="text-align:center;margin-top:14px;font-size:.88rem">
      Nao tem conta? <a href="/cadastro" style="color:#1a6b3c">Cadastre-se</a>
    </p>
  </div>
</div>
{% endblock %}
