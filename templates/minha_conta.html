{% extends 'base.html' %}
{% block title %}Minha Conta | Mercado Colatina{% endblock %}

{% block voltar %}<a href="/" class="voltar">Voltar ao inicio</a>{% endblock %}

{% block content %}
<div style="max-width:420px;margin:0 auto">
  <h2 style="margin-bottom:18px">Minha conta</h2>
  <div class="form-box">
    <p style="margin-bottom:14px;color:#555">Usuario: <strong>{{ session.usuario_nome }}</strong></p>
    <hr style="border:none;border-top:1px solid #eee;margin-bottom:16px">
    <h3 style="margin-bottom:14px;font-size:1rem">Alterar senha</h3>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-grupo">
        <label for="senha-atual">Senha atual</label>
        <input id="senha-atual" type="password" name="senha_atual" required autofocus minlength="4" autocomplete="current-password">
      </div>
      <div class="form-grupo">
        <label for="nova-senha">Nova senha</label>
        <input id="nova-senha" type="password" name="nova_senha" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-grupo">
        <label for="confirmar-senha">Confirmar nova senha</label>
        <input id="confirmar-senha" type="password" name="confirmar" required minlength="8" autocomplete="new-password">
      </div>
      <button class="btn btn-verde" type="submit" style="width:100%">Salvar nova senha</button>
    </form>
  </div>
</div>
{% endblock %}
