{% macro painel_compartilhar(url, titulo, texto, rotulo='Compartilhar') %}
<details class="share-panel" data-share-panel data-share-url="{{ url }}" data-share-title="{{ titulo }}" data-share-text="{{ texto }}">
  <summary>{{ rotulo }}</summary>
  <div class="share-menu" role="group" aria-label="Opções para {{ rotulo|lower }}">
    <button class="btn btn-wpp" type="button" data-share-action="whatsapp">WhatsApp</button>
    <button class="btn btn-cinza" type="button" data-share-action="native">Outras opções</button>
    <button class="btn btn-cinza" type="button" data-share-action="copy">Copiar link</button>
  </div>
  <p class="share-feedback" data-share-feedback role="status" aria-live="polite"></p>
</details>
{% endmacro %}
