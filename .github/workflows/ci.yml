name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  testes:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FLASK_ENV: testing
      SECRET_KEY: github-actions-test-key
      DATABASE_PATH: /tmp/mercado-colatina-tests.db
      DATABASE_URL: ""
      RESTORED_DATABASE_URL: ""
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v5

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt ruff

      - name: Verificar codigo
        run: |
          ruff check .
          ruff format --check .

      - name: Executar testes isolados
        run: python -m unittest discover -s tests -v
