{% extends 'base.html' %}
{% block title %}Login — Mercado Colatina{% endblock %}

{% block voltar %}<a href="/" class="voltar">← Voltar ao início</a>{% endblock %}

{% block content %}
<div style="max-width:380px;margin:0 auto">
  <h2 style="margin-bottom:18px">Entrar</h2>
  <div class="form-box">
    <form method="POST">
      <div class="form-grupo">
        <label>Usuário</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="form-grupo">
        <label>Senha</label>
        <input type="password" name="senha" required>
      </div>
      <button class="btn btn-verde" type="submit" style="width:100%">Entrar</button>
    </form>
    <p style="text-align:center;margin-top:14px;font-size:.85rem">
      Não tem conta? <a href="/cadastro" style="color:#1a6b3c">Cadastre-se</a>
    </p>
  </div>
</div>
{% endblock %}
