{% extends 'base.html' %}
{% block title %}Cadastro — Mercado Colatina{% endblock %}
{% block content %}
<div style="max-width:400px; margin:40px auto;">
  <h2 style="margin-bottom:20px;">Criar conta</h2>
  <div class="form-box">
    <form method="POST">
      <div class="form-grupo">
        <label>Nome completo</label>
        <input type="text" name="nome" required autofocus placeholder="Seu nome">
      </div>
      <div class="form-grupo">
        <label>Username</label>
        <input type="text" name="username" required placeholder="Como vai logar">
      </div>
      <div class="form-grupo">
        <label>Senha</label>
        <input type="password" name="senha" required>
      </div>
      <div class="form-grupo">
        <label>WhatsApp (só números)</label>
        <input type="text" name="whatsapp" required placeholder="27999999999">
      </div>
      <button class="btn btn-verde" type="submit" style="width:100%">Criar conta</button>
    </form>
    <p style="text-align:center; margin-top:14px; font-size:0.85rem;">
      Já tem conta? <a href="/login" style="color:#1a6b3c;">Entrar</a>
    </p>
  </div>
</div>
{% endblock %}
