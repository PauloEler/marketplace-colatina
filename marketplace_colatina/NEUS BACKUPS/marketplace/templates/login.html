{% extends 'base.html' %}
{% block title %}Login — Mercado Colatina{% endblock %}
{% block content %}
<div style="max-width:400px; margin:40px auto;">
  <div class="form-box">
    <h2 style="margin-bottom:20px;">Entrar</h2>
    <form method="POST">
      <div class="form-grupo">
        <label>Usuário</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="form-grupo">
        <label>Senha</label>
        <input type="password" name="senha" required>
      </div>
      <button class="btn btn-verde" type="submit" style="width:100%">Entrar</button>
    </form>
    <p style="text-align:center; margin-top:14px; font-size:0.85rem;">
      Não tem conta? <a href="/cadastro" style="color:#1a6b3c;">Cadastre-se</a>
    </p>
  </div>
</div>
{% endblock %}
